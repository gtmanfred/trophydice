services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trophydice
      POSTGRES_PASSWORD: trophydice
      POSTGRES_DB: trophydice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trophydice"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://trophydice:trophydice@db:5432/trophydice
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
